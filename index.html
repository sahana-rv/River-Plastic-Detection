<!DOCTYPE html>
<html>
<head>
    <title>River Plastic Detection</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            padding: 20px;
        }

        h1 {
            color: #0066cc;
        }

        button, input[type=file] {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
        }

        #webcam-container, #image-container {
            margin-top: 20px;
        }

        #uploadedImage {
            max-width: 300px;
            max-height: 300px;
            border: 2px solid #000;
            display: none;
        }

        #label-container {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>River Plastic Detection</h1>

    <button onclick="startCamera()">Start Camera</button>

    <br>

    <input type="file" id="imageUpload" accept="image/*">

    <div id="webcam-container"></div>

    <div id="image-container">
        <img id="uploadedImage">
    </div>

    <div id="label-container"></div>

<script>

const MODEL_URL = "./";

let model, webcam;
let isModelLoaded = false;

async function loadModel() {

    if (!isModelLoaded) {

        const modelURL = MODEL_URL + "model.json";
        const metadataURL = MODEL_URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);

        isModelLoaded = true;
    }
}

async function startCamera() {

    await loadModel();

    document.getElementById("uploadedImage").style.display = "none";

    webcam = new tmImage.Webcam(300, 300, true);

    await webcam.setup();
    await webcam.play();

    const webcamContainer =
        document.getElementById("webcam-container");

    webcamContainer.innerHTML = "";
    webcamContainer.appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);
}

async function loop() {

    if (webcam) {
        webcam.update();

        const prediction =
            await model.predict(webcam.canvas);

        displayResult(prediction);

        window.requestAnimationFrame(loop);
    }
}

document.getElementById("imageUpload")
.addEventListener("change", async function(event) {

    await loadModel();

    if (webcam) {
        webcam.stop();
    }

    const image =
        document.getElementById("uploadedImage");

    image.src =
        URL.createObjectURL(event.target.files[0]);

    image.style.display = "block";

    image.onload = async function() {

        const prediction =
            await model.predict(image);

        displayResult(prediction);
    };
});

function displayResult(predictions) {

    let output = "";

    predictions.forEach(prediction => {

        output += prediction.className +
            " : " +
            (prediction.probability * 100).toFixed(2)
            + "%<br>";
    });

    document.getElementById("label-container")
        .innerHTML = output;
}

</script>

</body>
</html>
